# ── Notifications ─────────────────────────────────
# When and how do you want to be notified?
notifications:
  # Desktop notification (macOS/Windows/Linux)
  desktop: true

  # Only notify on certain days?
  # Empty = always, or e.g. ["Mo", "Di", "Mi", "Do", "Fr"]
  nur_an_tagen: []

  # Only during certain hours?
  stille_zeit:
    von: "22:00"
    bis: "08:00"

  # Apprise URLs — Push, Email, Telegram, Slack, etc. (133+ services)
  # Full list: https://github.com/caronc/apprise/wiki
  apprise_urls:
    - "ntfy://wiesn-alert"       # Mobile push (free, no account needed)
    # - "tgram://BOT_TOKEN/CHAT_ID"  # Telegram
    # - "slack://TOKEN_A/TOKEN_B/TOKEN_C"  # Slack
    # - "discord://WEBHOOK_ID/WEBHOOK_TOKEN"  # Discord

  # BotBell — Push notifications on iPhone/iPad/Mac
  # 1. Install BotBell app from the App Store
  # 2. Create a bot → copy the token (bt_... or pak_...)
  # 3. Paste here:
  botbell_token: ""   # e.g. "bt_abc123" or "pak_xyz789"

  # Fun emojis in notification titles? 🍺🌙🎪
  use_emojis: true

# ── Monitoring ────────────────────────────────────
monitoring:
  check_interval_minutes: 30
  max_retries: 3
  screenshot_on_change: true
  screenshot_dir: "./screenshots"

# ── Browser ───────────────────────────────────────
browser:
  headless: true       # true = invisible, false = browser visible
  slow_mo: 300         # ms between actions
  timeout: 30000       # max wait time in ms
