# ═══════════════════════════════════════════════════
# Wiesn-Agent Configuration
# ═══════════════════════════════════════════════════
# Adjust this file to your needs.
# Copy it as config.yaml and fill in your information.

# ── Your details for reservation requests ─────────
user:
  vorname: "Max"
  nachname: "Mustermann"
  email: "max@example.com"
  telefon: "+49 170 1234567"
  personen: 10
  notizen: "Business dinner, prefer indoor seating"
  # Optional address fields (used for form auto-fill)
  strasse: ""
  hausnummer: ""
  plz: ""
  stadt: ""
  firma: ""

# ── Preferred dates & time slots ──────────────────
# Which days and slots do you want to reserve?
# Slots: morgens (10-12h), mittags (12-16h), abends (16-23h)
reservierung:
  # Which dates do you prefer?
  wunsch_tage:
    - "2026-09-19"  # Saturday — Opening day
    - "2026-09-20"  # Sunday
    - "2026-09-26"  # Saturday
    - "2026-10-03"  # German Unity Day

  # Which time slots do you prefer?
  slots:
    morgens:
      enabled: true
      von: "10:00"
      bis: "12:00"
      prioritaet: 3        # 1 = highest, 3 = lowest

    mittags:
      enabled: true
      von: "12:00"
      bis: "16:00"
      prioritaet: 2

    abends:
      enabled: true
      von: "16:00"
      bis: "23:00"
      prioritaet: 1         # Evening is most popular for most people

  # Minimum and maximum number of people
  min_personen: 6
  max_personen: 12

